<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedPlay Nexus</title>
  <meta name="description" content="MedPlay Nexus — Learn frontend, backend, cybersecurity and EHR through gamified coding challenges. Earn XP, climb the leaderboard.">
  <meta property="og:title" content="MedPlay Nexus — Code. Play. Level Up.">
  <meta property="og:description" content="Gamified coding challenges across Frontend, Backend, Cybersec, and EHR.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%E2%AC%A1%3C/text%3E%3C/svg%3E">
  <style>
    body { margin:0; background:#08080d; color:#fff; font-family:system-ui, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .center { text-align:center; }
    .center h1 { font-size:32px; margin-bottom:8px; letter-spacing:4px; }
    .center .accent { background:linear-gradient(135deg,#b14dff,#ff4d8e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .center p { color:#8b8ba0; font-size:14px; margin-bottom:24px; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#b14dff; box-shadow:0 0 12px #b14dff; animation:pulse 1.5s infinite; margin:0 4px; }
    .dot:nth-child(2){animation-delay:.2s;background:#d780ff;box-shadow:0 0 12px #d780ff;}
    .dot:nth-child(3){animation-delay:.4s;background:#ff4d8e;box-shadow:0 0 12px #ff4d8e;}
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(0.6);opacity:0.4;} }
    a { color:#b14dff; text-decoration:none; }
  </style>
  <script>
    // Redirect to the loading entry-point
    window.location.replace('frontend/pages/loading.html');
  </script>
</head>
<body>
  <div class="center">
    <h1>MEDPLAY<span class="accent"> NEXUS</span></h1>
    <p>Loading<span class="dot"></span><span class="dot"></span><span class="dot"></span></p>
    <p><a href="frontend/pages/loading.html">Click here if not redirected automatically</a></p>
  </div>
</body>
</html>
